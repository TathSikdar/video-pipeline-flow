version: '3.8'

services:
  botguard-provider:
    build:
      context: ./microservices/botguard-provider
    container_name: video-pipeline-botguard
    ports:
      - "3000:3000"

  backend:
    depends_on:
      - botguard-provider
    build:
      context: ./backend
    container_name: video-pipeline-backend
    network_mode: "host"
    env_file:
      - ./backend/.env
    environment:
      - WORKSPACE_DIR=/dev/shm
    # Crucial setting for local testing: Docker defaults to 64MB for /dev/shm.
    # 2.5GB reflects the server constraint.
    shm_size: '2.5gb'
    volumes:
      - ./backend:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000

  frontend:
    image: nginx:alpine
    container_name: video-pipeline-frontend
    network_mode: "host"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  ipv6-rotator:
    build:
      context: ./deployment
      dockerfile: Dockerfile.rotator
    container_name: video-pipeline-ipv6-rotator
    network_mode: "host"
    cap_add:
      - NET_ADMIN
