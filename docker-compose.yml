version: '3.8'

services:
  botguard-provider:
    build:
      context: ./microservices/botguard-provider
    container_name: video-pipeline-botguard
    ports:
      - "3000:3000"

  backend:
    depends_on:
      - botguard-provider
    build:
      context: ./backend
    container_name: video-pipeline-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - WORKSPACE_DIR=/dev/shm
    # Crucial setting for local testing: Docker defaults to 64MB for /dev/shm.
    # 2.5GB reflects the server constraint.
    shm_size: '2.5gb'
    volumes:
      - ./backend:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
